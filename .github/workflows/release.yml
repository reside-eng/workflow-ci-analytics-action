name: Release

on:
  push:
    branches:
      - main
      - next
      - alpha
      - beta
      # N.x (maintenance release branches)
      - '[0-9]+.x'

concurrency:
  group: release-${{ github.ref }}

env:
  NODE_VERSION: 24.x

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          # Sets us to be able to use NODE_AUTH_TOKEN for npm auth
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_READ_TOKEN }}
        run: yarn install --immutable

      - name: Check
        run: yarn check

      - name: Type check
        run: yarn types:check

      - name: Test
        run: yarn test:cov
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: yarn build

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        id: semantic
        with:
          semantic_version: ^24
          branches: |
            [
              '+([0-9])?(.{+([0-9]),x}).x',
              'main',
              'next',
              'next-major',
              {name: 'beta', prerelease: true},
              {name: 'alpha', prerelease: true}
            ]
          # Config override used disable features of @semantic-release/github causing rate limit
          # @semantic-release/exec is installed internally
          extends: |
            @side/semantic-config-base-without-npm
          # Sticky version until issue resolved. ref: https://github.com/semantic-release/semantic-release/issues/2922
          extra_plugins: |
            conventional-changelog-conventionalcommits@8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_READ_TOKEN }}

      - name: Publish floating major version tag
        # If a new version is published, i.e. v1.2.3 then this step force-moves
        # the floating major tag "v1" to this commit, so consumers can pin @v1 and
        # Renovate (github-tags datasource reads tags, not branches) can track it.
        # https://github.com/reside-eng/workflow-status-notification-action/branches
        # The dist folder (built) is included so that action can be used directly from Github
        # ref (where exact versions can pull from npm)
        if: steps.semantic.outputs.new_release_published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # NOTE: Git user must be set in order for amend of commit to add dist folder
        # --force is used because dist is within gitignore
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          MAJOR_TAG="v${{steps.semantic.outputs.new_release_major_version}}"
          git tag -f "${MAJOR_TAG}"
          git push -f https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git "refs/tags/${MAJOR_TAG}"

  notification:
    if: always()
    name: notification
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: technote-space/workflow-conclusion-action@45ce8e0eb155657ab8ccf346ade734257fd196a5 # v3.0.3

      - uses: reside-eng/workflow-status-notification-action@v1.5.1
        with:
          current-status: ${{ env.WORKFLOW_CONCLUSION }}
          slack-webhook: ${{ secrets.SLACK_WEBHOOK_PLATFORM_PROD }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
